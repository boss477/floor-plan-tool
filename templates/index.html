<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PLANR · 2D Floor Plan</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --g: #2d5a27;
      --g2: #4a8c42;
      --ink: #1a1a1a;
      --s: #fff;
      --s2: #f7f6f3;
      --s3: #eeece8;
      --bdr: #d8d4cc;
      --r: 8px
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--s2);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--s);
      border-bottom: 1px solid var(--bdr);
      flex-shrink: 0;
      flex-wrap: wrap
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--g);
      letter-spacing: .1em;
      font-weight: 500;
      margin-right: 6px
    }

    .btn {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--bdr);
      background: var(--s);
      font-size: 11px;
      cursor: pointer;
      color: #555;
      font-family: 'Sora', sans-serif;
      font-weight: 500;
      transition: .15s
    }

    .btn:hover {
      background: var(--s3);
      color: var(--ink)
    }

    .btn.on {
      background: var(--g);
      color: #fff;
      border-color: var(--g)
    }

    .btn.primary {
      background: var(--g);
      color: #fff;
      border-color: var(--g)
    }

    .btn.primary:hover {
      background: var(--g2)
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .sep {
      width: 1px;
      height: 16px;
      background: var(--bdr);
      margin: 0 2px
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    .sidebar {
      width: 300px;
      background: var(--s);
      border-right: 1px solid var(--bdr);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0
    }

    .sb-tabs {
      display: flex;
      border-bottom: 1px solid var(--bdr)
    }

    .sb-tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: .15s
    }

    .sb-tab.on {
      color: var(--ink);
      border-bottom-color: var(--g)
    }

    .sb-content {
      flex: 1;
      overflow-y: auto;
      padding: 14px
    }

    .sb-content::-webkit-scrollbar {
      width: 3px
    }

    .sb-content::-webkit-scrollbar-thumb {
      background: var(--bdr);
      border-radius: 2px
    }

    .canvas-area {
      flex: 1;
      overflow: auto;
      background: #c8c4bc;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 24px;
      position: relative
    }

    canvas {
      background: #fff;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.18);
      cursor: crosshair;
      display: block
    }

    .steps {
      display: flex;
      gap: 6px;
      align-items: center
    }

    .step {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--bdr);
      background: var(--s2);
      color: #888;
      font-weight: 500
    }

    .step.on {
      background: var(--g);
      color: #fff;
      border-color: var(--g)
    }

    .step.done {
      background: var(--s3);
      color: var(--g);
      border-color: var(--g)
    }

    .panel {
      display: none;
      flex-direction: column;
      gap: 12px
    }

    .panel.on {
      display: flex
    }

    .drop {
      border: 1.5px dashed var(--bdr);
      border-radius: 10px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      background: var(--s2);
      transition: .2s;
      position: relative
    }

    .drop:hover {
      border-color: var(--g);
      background: #f0f7ef
    }

    .drop input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%
    }

    .drop-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 12px;
      color: #aaa
    }

    .drop-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .drop-sub {
      font-size: 12px;
      color: #888
    }

    .preview-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--bdr);
      max-height: 160px;
      object-fit: contain;
      background: #fff
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    input[type=text],
    input[type=number],
    select,
    textarea {
      padding: 7px 10px;
      border: 1px solid var(--bdr);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Sora', sans-serif;
      background: var(--s2);
      color: var(--ink);
      width: 100%
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: var(--g)
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: flex-start
    }

    .room-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px
    }

    .room-table th {
      text-align: left;
      padding: 5px 4px;
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .04em;
      border-bottom: 1px solid var(--bdr)
    }

    .room-table td {
      padding: 4px;
      border-bottom: 1px solid var(--s3);
      vertical-align: middle
    }

    .room-table tr:last-child td {
      border-bottom: none
    }

    .room-table input,
    .room-table select {
      padding: 2px 4px;
      font-size: 10px;
      border: 1px solid var(--bdr);
      border-radius: 4px;
      background: var(--s2);
      color: var(--ink);
      font-family: 'DM Mono', monospace
    }

    .room-table input {
      width: 62px;
      text-align: right
    }

    .room-table input.xpos {
      width: 52px;
      background: #f0f7ef
    }

    .rdot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      display: inline-block;
      margin-right: 4px;
      vertical-align: middle
    }

    .badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 500
    }

    .badge.printed {
      background: #d4edda;
      color: #155724
    }

    .badge.estimated {
      background: #fff3cd;
      color: #856404
    }

    .warn-bar {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #856404
    }

    .del-btn {
      cursor: pointer;
      color: #dc3545;
      font-size: 14px;
      padding: 0 3px;
      border: none;
      background: none;
      line-height: 1
    }

    .sku-card {
      background: var(--s2);
      border: 1px solid var(--bdr);
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 5px
    }

    .sku-code {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--g);
      margin-bottom: 2px
    }

    .sku-name {
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 3px
    }

    .sku-dims {
      font-size: 10px;
      color: #888;
      font-family: 'DM Mono', monospace
    }

    .sku-price {
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Mono', monospace
    }

    .bom-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid var(--s3);
      font-size: 11px;
      gap: 6px
    }

    .bom-row:last-child {
      border-bottom: none
    }

    .bom-total {
      display: flex;
      justify-content: space-between;
      padding: 8px 0 0;
      border-top: 1px solid var(--bdr);
      font-weight: 600;
      font-size: 12px;
      margin-top: 2px
    }

    .mono {
      font-family: 'DM Mono', monospace
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--bdr);
      border-top-color: var(--g);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888
    }

    .stat {
      flex: 1;
      background: var(--s2);
      border: 1px solid var(--bdr);
      border-radius: 6px;
      padding: 7px 10px;
      text-align: center
    }

    .stat-val {
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Mono', monospace
    }

    .stat-lbl {
      font-size: 9px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-top: 1px
    }

    .slabel {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px
    }

    .toolbar-label {
      font-size: 10px;
      color: #888;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .sku-compat {
      border-color: #4A9E6B !important;
      cursor: pointer;
    }

    .sku-compat:hover {
      background: #e8f5ed;
    }

    .sku-active {
      background: #d4f0e0 !important;
      border-color: #2d5a27 !important;
      border-width: 2px !important;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="logo">PLANR · 2D</div>
    <div class="steps">
      <div class="step on" id="s1">01 Upload</div>
      <div class="step" id="s2">02 Confirm</div>
      <div class="step" id="s3">03 Render</div>
    </div>
    <div style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
      <span class="toolbar-label">View:</span>
      <button class="btn on" id="b-color" onclick="setView('color')">Color</button>
      <button class="btn" id="b-bw" onclick="setView('bw')">B&W</button>
      <button class="btn on" id="b-dims" onclick="toggleDims()">Dimensions</button>
      <button class="btn on" id="b-furn" onclick="toggleFurn()">Furniture</button>
      <button class="btn on" id="b-area" onclick="toggleArea()">Area</button>
      <div class="sep"></div>
      <button class="btn" onclick="zoomIn()">＋</button>
      <button class="btn" onclick="zoomOut()">－</button>
      <button class="btn" onclick="zoomFit()">Fit</button>
      <div class="sep"></div>
      <button class="btn primary" id="export-btn" onclick="exportPNG()" disabled>⬇ Export PNG</button>
      <button class="btn" id="pdf-btn" onclick="exportPDF()" disabled>⬇ PDF Quote</button>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sb-tabs">
        <div class="sb-tab on" id="tab-btn-upload" onclick="sbTab('upload',this)">Upload</div>
        <div class="sb-tab" id="tab-btn-rooms" onclick="sbTab('rooms',this)">Rooms</div>
        <div class="sb-tab" id="tab-btn-skus" onclick="sbTab('skus',this)">SKUs</div>
        <div class="sb-tab" id="tab-btn-bom" onclick="sbTab('bom',this)">BOM</div>
      </div>

      <div class="sb-content" id="tab-upload">
        <div class="panel on">
          <div class="field">
            <div class="label">Floor plan image</div>
            <div class="drop">
              <input type="file" id="file-input" accept="image/*" onchange="onFile(this)">
              <svg class="drop-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="4" y="8" width="32" height="26" rx="3" />
                <path d="M14 22l6-6 6 6M20 16v12" />
              </svg>
              <div class="drop-title">Upload floor plan</div>
              <div class="drop-sub">JPG · PNG · Any 2D plan image</div>
            </div>
          </div>
          <div id="img-preview" style="display:none">
            <img id="preview" class="preview-img">
          </div>
          <div class="field">
            <div class="label">Project name</div>
            <input type="text" id="proj-name" placeholder="e.g. Sharma Residence GF" value="My Project">
          </div>
          <div class="field">
            <div class="label">Known building dimensions (optional)</div>
            <div class="row">
              <input type="number" id="bldg-w" placeholder="Total W mm" style="flex:1">
              <input type="number" id="bldg-l" placeholder="Total L mm" style="flex:1">
            </div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn primary" id="extract-btn" onclick="doExtract()" disabled style="flex:1">Extract rooms
              →</button>
            <button class="btn" onclick="loadDemo()" style="flex:1">Demo plan</button>
          </div>
          <div id="extract-status"></div>
        </div>
      </div>

      <div class="sb-content" id="tab-rooms" style="display:none">
        <div class="panel on">
          <div id="warn-estimated"></div>
          <div style="overflow-x:auto">
            <table class="room-table" id="rooms-tbl">
              <thead>
                <tr>
                  <th></th>
                  <th>Room</th>
                  <th>Type</th>
                  <th>W mm</th>
                  <th>L mm</th>
                  <th title="X position from left edge">X</th>
                  <th title="Y position from top edge">Y</th>
                  <th>Src</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="rooms-body"></tbody>
            </table>
          </div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <button class="btn" onclick="addRoom()" style="flex:1">+ Add room</button>
            <button class="btn primary" onclick="doRender()" id="render-btn" style="flex:1">Render →</button>
          </div>
        </div>
      </div>

      <div class="sb-content" id="tab-skus" style="display:none">
        <div class="slabel">Catalogue</div>
        <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
          <input type="file" id="sku-img-input" accept="image/*" style="display:none"
            onchange="importSKUsFromImage(this)">
          <button class="btn" onclick="document.getElementById('sku-img-input').click()"
            style="flex:1;font-size:10px">📷 Import from Catalogue Image</button>
          <div id="sku-import-status" style="font-size:10px;color:#888;width:100%"></div>
        </div>
        <div id="sku-list"></div>
      </div>

      <div class="sb-content" id="tab-bom" style="display:none">
        <div class="slabel">Bill of materials</div>
        <div id="bom-list"></div>
      </div>
    </div>

    <div class="canvas-area" id="canvas-area">
      <canvas id="plan-canvas" width="1200" height="900"></canvas>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════
    // SKU CATALOGUE
    // ═══════════════════════════════════════════════════════════════════
    const SKUS = [
      { code: 'SOF-ANORA-3S', name: 'ANORA 3-SEATER SOFA', cat: 'sofa', room: 'living', w: 2000, h: 830, d: 775, price: 69900 },
      { code: 'SOF-PRAVO-4S', name: 'PRAVO 4-SEATER SOFA', cat: 'sofa', room: 'living', w: 2800, h: 825, d: 750, price: 124050 },
      { code: 'SOF-PRAVO-2S', name: 'PRAVO 2-SEATER SOFA', cat: 'sofa', room: 'living', w: 1425, h: 825, d: 750, price: 65306 },
      { code: 'CHR-MASSA-LNG', name: 'MASSA LOUNGE CHAIR', cat: 'chair', room: 'living', w: 800, h: 850, d: 750, price: 46200 },
      { code: 'TBL-WL-STD', name: 'WL STANDARD TABLE', cat: 'ctable', room: 'living', w: 1200, h: 340, d: 700, price: 20100 },
      { code: 'TBL-CURVE-SIDE', name: 'CURVE SIDE TABLE', cat: 'stable', room: 'living', w: 600, h: 500, d: 300, price: 17212 },
      { code: 'TBL-CURVE-DIN', name: 'CURVE DINING TABLE', cat: 'dtable', room: 'dining', w: 1200, h: 450, d: 1200, price: 30262 },
      { code: 'KIT-UC-600', name: 'UPPER CABINET 600mm', cat: 'kitupper', room: 'kitchen', w: 600, h: 720, d: 350, price: 12500 },
      { code: 'KIT-BC-PNP', name: 'POT N PAN BASE UNIT', cat: 'kitbase', room: 'kitchen', w: 600, h: 870, d: 580, price: 18000 },
      { code: 'KIT-TU-PANTRY', name: 'PANTRY TALL UNIT', cat: 'kittall', room: 'kitchen', w: 600, h: 2100, d: 580, price: 28000 },
      { code: 'WRD-SLD-2940', name: '3-DOOR SLIDING WARDROBE', cat: 'wardrobe', room: 'bedroom', w: 2940, h: 2400, d: 620, price: 95000 },
      { code: 'WRD-OPN-2030', name: '4-DOOR OPENABLE WARDROBE', cat: 'wardrobe', room: 'bedroom', w: 2030, h: 2400, d: 625, price: 75000 },
      { code: 'VAN-1550-V1', name: 'DOUBLE BASIN VANITY 1550mm', cat: 'vanity', room: 'bathroom', w: 1550, h: 600, d: 520, price: 85000 },
      { code: 'DIN-CHR-01', name: 'DINING CHAIR', cat: 'dchair', room: 'dining', w: 500, h: 900, d: 500, price: 8000 },
      { code: 'BED-KG-01', name: 'KING SIZE BED', cat: 'bed', room: 'bedroom', w: 1800, h: 500, d: 2100, price: 45000 },
      { code: 'BED-ST-01', name: 'BEDSIDE TABLE', cat: 'bside', room: 'bedroom', w: 500, h: 550, d: 400, price: 8500 },
    ];

    // Furniture type → SKU code mapping for BOM
    const FURN_SKU = {
      bed: 'BED-KG-01', bside: 'BED-ST-01', sofa: 'SOF-ANORA-3S',
      ctable: 'TBL-WL-STD', dtable: 'TBL-CURVE-DIN', dchair: 'DIN-CHR-01',
      wardrobe: 'WRD-SLD-2940', vanity: 'VAN-1550-V1',
      kitupper: 'KIT-UC-600', kitbase: 'KIT-BC-PNP',
    };

    // ═══════════════════════════════════════════════════════════════════
    // ROOM COLORS  —  warm-tan palette (image-2 style)
    // ═══════════════════════════════════════════════════════════════════
    const ROOM_COLORS = {
      living: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
      bedroom: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
      kitchen: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
      bathroom: { fill: '#8ABCD8', wall: '#1a4a60', label: '#0a3a50' },
      dining: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
      corridor: { fill: '#E8B848', wall: '#2a1a00', label: '#3a2a00' },
      balcony: { fill: '#A8C0A8', wall: '#2a3a2a', label: '#1a2a1a' },
      study: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
      default: { fill: '#F2C46C', wall: '#2a1a00', label: '#3a2a00' },
    };

    // ═══════════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════════
    let rooms = [];
    let imgB64 = null, imgMime = null;
    let imgNatW = 800, imgNatH = 600;
    let viewColor = true, showDims = true, showFurn = true, showArea = true;
    let zoom = 1.0;

    // Furniture interaction state
    let furnItems = [];       // placed furniture pieces
    let selectedFurnIdx = -1; // -1 = nothing selected
    let isDragging = false;
    let dragOffX = 0, dragOffY = 0;
    const PLAN_OX = 16, PLAN_OY = 52; // canvas offset for plan area

    // ═══════════════════════════════════════════════════════════════════
    // FILE UPLOAD
    // ═══════════════════════════════════════════════════════════════════
    function onFile(inp) {
      const f = inp.files[0]; if (!f) return;
      imgMime = f.type || 'image/jpeg';
      const r = new FileReader();
      r.onload = e => {
        imgB64 = e.target.result.split(',')[1];
        document.getElementById('preview').src = e.target.result;
        document.getElementById('img-preview').style.display = 'block';
        document.getElementById('extract-btn').disabled = false;
        // Capture natural image dimensions
        const tempImg = new Image();
        tempImg.onload = () => { imgNatW = tempImg.naturalWidth; imgNatH = tempImg.naturalHeight; console.log('Image dims:', imgNatW, 'x', imgNatH); };
        tempImg.src = e.target.result;
      };
      r.readAsDataURL(f);
    }

    // Demo: High-precision spatial data
    function loadDemo() {
      imgNatW = 800; imgNatH = 600; // Force landscape aspect for demo
      const demoData = [
        { "name": "Balcony TL", "type": "balcony", "x_norm": 0.05, "y_norm": 0.04, "w_norm": 0.22, "h_norm": 0.12, "width_ft": 5.74, "length_ft": 5.74 },
        { "name": "M. Bed Room", "type": "bedroom", "x_norm": 0.05, "y_norm": 0.16, "w_norm": 0.27, "h_norm": 0.30, "width_ft": 11.17, "length_ft": 11.5 },
        { "name": "CB Left", "type": "storage", "x_norm": 0.00, "y_norm": 0.32, "w_norm": 0.05, "h_norm": 0.18, "width_ft": 3.21, "length_ft": 3.21 },
